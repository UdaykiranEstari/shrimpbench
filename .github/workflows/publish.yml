name: Publish Python 🐍 distribution 📦 to PyPI

on:
  release:
    types: [published]
  # This triggers the workflow when you publish a new Release on GitHub

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    
    # This environment name MUST match the one you set up in PyPI
    environment:
      name: pypi
      url: https://pypi.org/p/shrimpbench 
    
    # These permissions are required for OIDC Trusted Publishing
    permissions:
      id-token: write 
      contents: read

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install build dependencies
      run: python -m pip install --upgrade pip build

    - name: Build the package
      run: python -m build

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1